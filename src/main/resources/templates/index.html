<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Flight Management </title>
    </head>
    <body>
        <h1>Bienvenido al Gestor de vuelos</h1>
        <p th:text="${mensaje}"></p>
        <p th:text="${mensajeDesdeProperties}"></p>
        <hr>
        <b>CEDULA: </b><span th:text="${usuario.cedula}"></span><br>
        <b>CLAVE: </b><span th:text="${usuario.clave}"></span><br>
        <b>NOMBRE: </b><span th:text="${usuario.nombre}"></span><br>
        <b>EMAIL: </b><span th:text="${usuario.email}"></span><br>
    <hr>
    <h4>LISTA DE PERSONAS</h4>
    <hr>
    <div th:if="${listaUsuarios != null and !listaUsuarios.empty}">
        <table border="1">
            <tr>
                <th>CEDULA</th>
                <th>CLAVE</th>
                <th>NOMBRE</th>
                <th>EMAIL</th>
            </tr>
            <tr th:each="user : ${listaUsuarios}">
                <td th:text="${user.cedula}"></td>
                <td th:text="${user.clave}"></td>
                <td th:text="${user.nombre}"></td>
                <td th:text="${user.email}"></td>
            </tr>
            </tr>
        </table>
    </div>
    <div th:if="${listaUsuarios == null or listaUsuarios.empty}">
        <p>No hay usuarios registrados.</p>
    </div>
    </body>
</html>
